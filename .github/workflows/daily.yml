name: Daily Astro Signals + Paper Trading

on:
  schedule:
    # 12:30 UTC = 8:30am US Eastern (EDT) / 7:30am EST -- an hour before the
    # 9:30am NYSE open, Mon-Fri, so signals are ready before market open
    # rather than 5 min after. Fixed-UTC cron, so like the old time this
    # drifts an hour relative to ET across DST changes -- pre-existing
    # characteristic, not something this change fixes.
    - cron: '30 12 * * 1-5'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Run daily signals + paper trading
        working-directory: engine
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python main_daily.py
